<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Camila Soares Makeup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="icon" type="image/jpeg" href="assets/logo-black.png" />
  <link rel="apple-touch-icon" href="assets/logo-black.png" />
  <link rel="stylesheet" href="css/admin.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(240,114,114,.25) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(216,90,90,.3) 0%, transparent 50%),
        linear-gradient(160deg, #2A1414 0%, #3D1E1E 60%, #4A1F1F 100%);
    }

    .login-card {
      background: rgba(255,255,255,.97);
      border-radius: 24px;
      padding: 52px 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 30px 80px rgba(0,0,0,.4);
      text-align: center;
    }

    .login-logo {
      margin-bottom: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .login-logo img { display: block; }

    .login-logo-sub {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #8A6060;
    }

    .login-divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, #F07272, #D85A5A);
      margin: 20px auto;
      border-radius: 2px;
    }

    .login-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: #3D1E1E;
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: .88rem;
      color: #8A6060;
      margin-bottom: 32px;
    }

    .login-form .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    .login-form label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: #3D1E1E;
      margin-bottom: 6px;
      letter-spacing: .5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #F07272;
      font-size: .9rem;
    }

    .login-form input {
      width: 100%;
      padding: 12px 44px;
      border: 1.5px solid rgba(240,114,114,.3);
      border-radius: 12px;
      font-size: .92rem;
      font-family: 'Poppins', sans-serif;
      color: #3D1E1E;
      background: #FFF8F8;
      outline: none;
      transition: .3s;
    }

    .login-form input:focus {
      border-color: #F07272;
      box-shadow: 0 0 0 3px rgba(240,114,114,.12);
      background: #fff;
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #8A6060;
      font-size: .9rem;
      padding: 4px;
      transition: color .3s;
    }

    .toggle-password:hover { color: #F07272; }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #F07272, #D85A5A);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: .95rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: .3s;
      box-shadow: 0 4px 20px rgba(240,114,114,.35);
    }

    .login-btn:hover {
      background: linear-gradient(135deg, #D85A5A, #C04040);
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(240,114,114,.5);
    }

    .login-error {
      background: #FEE2E2;
      border: 1px solid #FECACA;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: .85rem;
      color: #991B1B;
      margin-top: 12px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .login-error.show { display: flex; }

    .login-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      font-size: .82rem;
      color: #8A6060;
      transition: color .3s;
    }

    .login-back:hover { color: #F07272; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="assets/logo-black.png" height="72" alt="Makeup Camila Soares" style="border-radius:8px" />
      <span class="login-logo-sub">Área Administrativa</span>
    </div>
    <div class="login-divider"></div>
    <h2>Bem-vinda!</h2>
    <p>Acesse o painel para gerenciar orçamentos e faturamento</p>

    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label for="loginUser">Usuário</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="loginUser" placeholder="Seu usuário" autocomplete="username" />
        </div>
      </div>
      <div class="form-group">
        <label for="loginPass">Senha</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPass" placeholder="Sua senha" autocomplete="current-password" />
          <button type="button" class="toggle-password" id="togglePass">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="login-btn">
        <i class="fas fa-sign-in-alt"></i> Entrar
      </button>
      <div class="login-error" id="loginError">
        <i class="fas fa-exclamation-circle"></i>
        <span>Usuário ou senha incorretos.</span>
      </div>
    </form>

    <a href="index.html" class="login-back">
      <i class="fas fa-arrow-left"></i> Voltar ao site
    </a>
  </div>

  <script>
    // Credenciais padrão (alterar conforme necessário)
    const ADMIN_USER = 'camila';
    const ADMIN_PASS = 'Camila0354';

    document.getElementById('togglePass').addEventListener('click', () => {
      const pass = document.getElementById('loginPass');
      const icon = document.getElementById('eyeIcon');
      if (pass.type === 'password') {
        pass.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        pass.type = 'password';
        icon.className = 'fas fa-eye';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('loginUser').value.trim();
      const pass = document.getElementById('loginPass').value;
      const err = document.getElementById('loginError');

      if (user === ADMIN_USER && pass === ADMIN_PASS) {
        sessionStorage.setItem('camilaAdmin', 'true');
        window.location.href = 'admin/index.html';
      } else {
        err.classList.add('show');
        document.getElementById('loginPass').value = '';
        setTimeout(() => err.classList.remove('show'), 4000);
      }
    });

    // If already logged in, redirect
    if (sessionStorage.getItem('camilaAdmin') === 'true') {
      window.location.href = 'admin/index.html';
    }
  </script>
</body>
</html>
