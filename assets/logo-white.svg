  <!-- Eyebrow: MAKEUP -->
  <text x="72" y="20"
    font-family="Arial,Helvetica,sans-serif"
    font-size="9"
    font-weight="700"
    fill="rgba(255,255,255,0.65)"
    letter-spacing="3.5">MAKEUP</text>

  <!-- Wordmark: CAMILA (branco) -->
  <text x="72" y="46"
    font-family="Georgia,'Playfair Display',serif"
    font-size="21"
    font-weight="700"
    fill="white">CAMILA</text>

  <!-- Wordmark: SOARES (coral claro italic) -->
  <text x="155" y="46"
    font-family="Georgia,'Playfair Display',serif"
    font-size="21"
    font-style="italic"
    font-weight="400"
    fill="#F9ABAB"> SOARES</text>
