<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 278 58">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F07272"/>
      <stop offset="100%" stop-color="#D85A5A"/>
    </linearGradient>
  </defs>

  <!-- Marca quadrada -->
  <rect width="58" height="58" rx="12" fill="url(#g)"/>
  <text x="29" y="42"
    font-family="Georgia,'Times New Roman',serif"
    font-size="29"
    font-style="italic"
    font-weight="bold"
    fill="white"
